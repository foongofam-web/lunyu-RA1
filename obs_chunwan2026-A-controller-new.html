var idx = 0;
var playing = true;

var segStarts = [];
for (var i = 0; i < slides.length; i++) {
  if (slides[i].divider && i > 0) segStarts.push(i);
}
segStarts.push(slides.length);

const channel = new BroadcastChannel('chunwan2026-sync-v4');

function beginShow() {
  document.getElementById('startOverlay').classList.add('fade-out');
  channel.postMessage({ action: 'start' });
  setTimeout(function() {
    document.getElementById('startOverlay').style.display = 'none';
    document.getElementById('ctrlPanel').style.display = 'flex';
    buildDots();
    sync();
  }, 600);
}

function buildDots() {
  var c = document.getElementById('dots');
  c.innerHTML = '';
  for (var i = 0; i < slides.length; i++){
    var d = document.createElement('div');
    var cls = 'dot';
    if (i === 0) cls = 'dot title-dot';
    else if (slides[i].divider) cls = 'dot seg-dot';
    d.className = cls;
    d.onclick = (function(i) { return function() { idx = i; sync(); channel.postMessage({ action: 'sync', index: idx, playing: playing }); }; })(i);
    c.appendChild(d);
  }
}

function sync() {
  var dots = document.querySelectorAll('.dot');
  for (var i = 0; i < dots.length; i++) dots[i].classList.toggle('active', i === idx);
  document.getElementById('info').textContent = (idx + 1) + ' / ' + slides.length;
  channel.postMessage({ action: 'sync', index: idx, playing: playing });
}

function next() { if (idx < slides.length - 1) { idx++; sync(); } }
function prev() { if (idx > 0) { idx--; sync(); } }
function togglePlay() {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
  channel.postMessage({ action: 'togglePlay', playing: playing });
}
function goTo(n) { idx = n; sync(); channel.postMessage({ action: 'sync', index: idx, playing: playing }); }

function jumpToSeg(segIdx) {
  if (segIdx === 0) { goTo(0); return; }
  var secIdx = segIdx - 1;
  if (secIdx < segStarts.length) goTo(segStarts[secIdx]);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  if (e.key === 'p' || e.key === 'P') togglePlay();
});
</script>
