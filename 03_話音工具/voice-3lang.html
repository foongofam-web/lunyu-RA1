<title>🌍 三語旅遊詞典 Voice Phrasebook</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a18;
  --card:#12122a;
  --border:#1e1e40;
  --zh:#FF6B6B;
  --en:#4ECDC4;
  --vi:#FFE66D;
  --gold:#FFD700;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:#e0e0f0;min-height:100vh;padding:14px;padding-bottom:90px}

/* Header */
.top{text-align:center;padding:10px 0 14px}
.top h1{font-size:1.7em;color:var(--gold);margin-bottom:4px}
.top p{color:#555;font-size:1em}

/* Category tabs */
.cat-tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.cat-btn{padding:10px 16px;border-radius:22px;border:2px solid var(--border);background:var(--card);color:#777;font-size:1em;font-weight:bold;cursor:pointer;transition:all 0.2s}
.cat-btn.act{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.1)}
.cat-btn:active{opacity:0.7}

/* Cards */
.cards{margin-top:4px}
.phrase-card{border-radius:16px;background:var(--card);border:2px solid var(--border);margin-bottom:10px;overflow:hidden}

/* 3-column horizontal layout */
.phrase-row{display:flex}
.phrase-row .lrow{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 8px;
  border-right:1px solid var(--border);
  cursor:pointer;
  transition:background 0.12s;
  text-align:center;
  gap:6px;
}
.phrase-row .lrow:last-child{border-right:none}
.phrase-row .lrow:active{background:#1c1c38}

.phrase-row .lrow .lbl{
  font-size:0.85em;
  font-weight:bold;
  padding:4px 10px;
  border-radius:8px;
  flex-shrink:0;
}
.phrase-row .lrow.zh .lbl{background:var(--zh);color:#fff}
.phrase-row .lrow.en .lbl{background:var(--en);color:#000}
.phrase-row .lrow.vi .lbl{background:var(--vi);color:#000}

.phrase-row .lrow .tx{
  font-size:1.1em;
  line-height:1.25;
  flex:1;
  word-break:break-word;
}

.phrase-row .lrow .pl{
  font-size:1.4em;
  color:var(--gold);
  background:#222244;
  border-radius:10px;
  padding:6px 12px;
  flex-shrink:0;
}
.phrase-row .lrow .pl:active{background:#383860}

footer{text-align:center;color:#2a2a4a;font-size:0.8em;margin-top:24px}
</style>
</head>

// ── Helpers ──
var VOICES=[];
var CUR_CAT="all";

function loadVoices(){
  var v=window.speechSynthesis.getVoices();
  if(v.length>0){VOICES=v;return;}
  window.speechSynthesis.onvoiceschanged=function(){VOICES=window.speechSynthesis.getVoices();};
  setTimeout(function(){VOICES=window.speechSynthesis.getVoices();},800);
}

function spk(text,lang){
  if(!text||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="vi"?"vi-VN":lang==="en"?"en-US":"zh-TW";
  u.rate=0.82;
  if(VOICES.length===0)VOICES=window.speechSynthesis.getVoices();
  var vl=lang==="vi"?"vi":lang==="en"?"en":"zh";
  var pref=VOICES.filter(function(v){return v.lang.startsWith(vl);});
  if(pref.length>0){
    var nat=pref.find(function(v){return v.localService||v.name.includes("Enhanced");});
    u.voice=nat||pref[0];
  }
  window.speechSynthesis.speak(u);
}

// One phrase = one card with 3 blocks side by side
function mkCard(p){
  var html='<div class="phrase-card">';
  html+='<div class="phrase-row">';
  html+='<div class="lrow zh" onclick="spk(\''+p.zh.replace(/'/g,"\\'")+'\',\'zh\')">';
  html+='<span class="lbl">🇨🇳 中</span>';
  html+='<span class="tx">'+p.zh+'</span>';
  html+='<span class="pl">▶</span>';
  html+='</div>';
  html+='<div class="lrow en" onclick="spk(\''+p.en.replace(/'/g,"\\'")+'\',\'en\')">';
  html+='<span class="lbl">🇺🇸 EN</span>';
  html+='<span class="tx">'+p.en+'</span>';
  html+='<span class="pl">▶</span>';
  html+='</div>';
  html+='<div class="lrow vi" onclick="spk(\''+p.vi.replace(/'/g,"\\'")+'\',\'vi\')">';
  html+='<span class="lbl">🇻🇳 VN</span>';
  html+='<span class="tx">'+p.vi+'</span>';
  html+='<span class="pl">▶</span>';
  html+='</div>';
  html+='</div></div>';
  return html;
}

function renderCats(){
  var html="";
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i];
    html+='<button class="cat-btn'+(c.k===CUR_CAT?" act":"")+'" onclick="setCat(\''+c.k+'\')">'+c.zh+'</button>';
  }
  document.getElementById("catTabs").innerHTML=html;
}

function render(){
  var html="";
  var keys=CUR_CAT==="all"?Object.keys(PHRASES):[CUR_CAT];
  for(var ki=0;ki<keys.length;ki++){
    var cat=PHRASES[keys[ki]];
    for(var i=0;i<cat.length;i++){
      html+=mkCard(cat[i]);
    }
  }
  document.getElementById("cards").innerHTML=html;
}

function setCat(k){
  CUR_CAT=k;
  renderCats();
  render();
}

loadVoices();
renderCats();
render();
</script>
