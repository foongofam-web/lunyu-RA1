<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出發咯 Let's Go!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#F0F4F8;color:#222;min-height:100vh;padding-bottom:70px}
.cc{max-width:480px;margin:0 auto;background:#FFF;min-height:calc(100vh - 70px);box-shadow:0 0 20px rgba(0,0,0,.05)}
.hdr{background:linear-gradient(135deg,#FF6B35,#FF8E53);color:#FFF;padding:16px 14px 14px;text-align:center}
.hdr h1{font-size:22px;font-weight:800;letter-spacing:1px}
.hdr .sub{font-size:12px;opacity:.9;margin-top:3px;font-weight:400}
.hdr .langsw{font-size:11px;background:rgba(255,255,255,.25);border:none;border-radius:20px;padding:4px 12px;color:#FFF;cursor:pointer;margin-top:8px;font-weight:600}
.hdr .langsw:active{background:rgba(255,255,255,.4)}
.sw{background:#FFF;border-bottom:1px solid #EEE;padding:8px 14px;display:flex;gap:8px;align-items:center;font-size:12px}
.sw label{cursor:pointer;padding:4px 10px;border-radius:20px;border:1.5px solid #DDD;font-weight:600;color:#666}
.sw input{display:none}
.sw input:checked+label{background:#FF6B35;color:#FFF;border-color:#FF6B35}
.tb{display:flex;background:#FFF;border-bottom:2px solid #EEE;overflow-x:auto}
.tb::-webkit-scrollbar{display:none}
.tb .t{flex:0 0 auto;padding:11px 14px;font-size:12px;font-weight:600;color:#999;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.tb .t.act{color:#FF6B35;border-bottom-color:#FF6B35}
.con{padding:12px 14px}
.st{font-size:13px;font-weight:700;color:#FF6B35;margin:14px 0 6px;display:flex;align-items:center;gap:5px}
.st:first-child{margin-top:0}
.ec{background:linear-gradient(135deg,#C0392B,#E74C3C);color:#FFF;border-radius:14px;padding:13px;margin-bottom:12px}
.ec .et{font-size:11px;font-weight:700;margin-bottom:6px;opacity:.9}
.ec .er{display:flex;gap:6px;font-size:12px;margin-bottom:3px}
.ec .el{font-weight:700;min-width:70px;opacity:.85}
.dc{background:#FFF;border-radius:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.dh{background:#FF6B35;color:#FFF;padding:10px 13px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.dh .ct{background:rgba(255,255,255,.25);padding:2px 9px;border-radius:20px;font-size:10px}
.si{display:flex;padding:9px 13px;border-bottom:1px solid #F5F5F5;gap:8px;align-items:center;flex-wrap:wrap}
.si:last-child{border-bottom:none}
.tc{flex:0 0 46px;font-size:11px;font-weight:700;color:#FF6B35;padding-top:2px}
.ac{flex:1;font-size:13px;line-height:1.5;min-width:100px}
.bt{flex:0 0 auto;background:#FF6B35;color:#FFF;border:none;border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;text-decoration:none;font-weight:600;text-align:center}
.bt:active{background:#e55a25}
.bt.map{background:#34A853}
.bt.map:active{background:#2a8f47}
.ic{background:#FFF;border-radius:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden}
.ir{display:flex;align-items:center;padding:11px 13px;gap:10px;border-bottom:1px solid #F5F5F5}
.ir:last-child{border-bottom:none}
.ii{flex:0 0 36px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.bf{background:#E3F2FD}.bh{background:#FFF8E1}.btag{background:#FCE4EC}.bv{background:#E8F5E9}
.icn{flex:1}
.icn .it{font-size:13px;font-weight:600}
.icn .is{font-size:11px;color:#777;margin-top:2px;line-height:1.4}
.rc{background:#FFF;border-radius:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:11px 13px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ri{font-size:20px;flex:0 0 28px}
.og{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.oi{background:#FFF;border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;font-size:12px}
.oi:active{transform:scale(.97)}
.oi .em{font-size:28px;display:block;margin-bottom:4px}
.oi .lb{font-weight:700;color:#FF6B35}
.oi .sb{font-size:10px;color:#999;margin-top:2px}
.cb{display:flex;align-items:center;padding:9px 13px;background:#FFF;border-radius:10px;margin-bottom:6px;gap:9px;font-size:13px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cb .bx{width:20px;height:20px;border:2px solid #FF6B35;border-radius:6px;flex:0 0 20px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#FF6B35;font-weight:700}
.cb.done{opacity:.45;text-decoration:line-through}
.cb.done .bx{background:#FF6B35;color:#FFF;border-color:#FF6B35}
.ph{background:#FFF;border-radius:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.phh{background:#FF6B35;color:#FFF;padding:9px 13px;font-size:13px;font-weight:700}
.phs{display:flex;flex-wrap:wrap;gap:7px;padding:10px}
.pbc{background:#FF6B35;color:#FFF;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;flex:1;min-width:130px;text-align:center}
.pbc:active{background:#e55a25}
.pbc.playing{background:#34A853}
.pbc.alt{background:#FFF;color:#FF6B35;border:1.5px solid #FF6B35}
.pbc.alt:active{background:#FFF5F0}
.pbc.alt.playing{background:#E8F5E9;color:#34A853;border-color:#34A853}
.ct-pad{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0 8px}
.flb{background:#FFF8F5;padding:7px 13px;font-size:11px;color:#FF6B35;border-radius:8px;font-weight:600;cursor:pointer;border:none}
.flb:active{background:#FFE8D5}
.ft{text-align:center;padding:14px;font-size:10px;color:#AAA}
/* Bottom Nav */
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#FFF;border-top:1px solid #EEE;z-index:200;max-width:480px;margin:0 auto}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0 6px;cursor:pointer;border:none;background:#FFF;font-size:10px;color:#999;gap:2px}
.bn:active{background:#F5F5F5}
.bn.act{color:#FF6B35}
.bn .be{font-size:20px;line-height:1}
.bn.lbl{font-size:9px;font-weight:600;margin-top:1px}
@keyframes fa{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.dc,.ic,.rc,.ph,.ec,.og{animation:fa .25s ease}
</style>
</head>
<body>
<div class="cc">
<div class="hdr">
<h1>✈️ <span class="zh">出發咯</span><span class="en">Let's Go!</span></h1>
<div class="sub"><span class="zh">越南 + 台灣 旅遊攻略 2026</span><span class="en">Vietnam + Taiwan Travel 2026</span></div>
<button class="langsw" onclick="toggleLang()">🌐 <span id="langLabel">EN</span></button>
</div>
<div class="sw">
<input type="radio" id="swZH" name="lang" checked onchange="setLang('zh')">
<label for="swZH">🇨🇳 中文</label>
<input type="radio" id="swEN" name="lang" onchange="setLang('en')">
<label for="swEN">🇺🇸 EN</label>
</div>
<div class="tb" id="tabBar"></div>
<div id="content"></div>
<div class="ft"><span class="zh">越南＋台灣旅遊攻略 2026 | RA1</span><span class="en">Vietnam + Taiwan Travel 2026 | RA1</span></div>
</div>
<div class="bnav" id="bnav"></div>
<script>
var L="zh",cur="home";
var D=null;
function mm(p){return p?"https://maps.me/search/?q="+encodeURIComponent(p):"#";}
function $(id){return document.getElementById(id);}
function tl(zh,en){return L==="zh"?zh:en;}
function setLang(l){L=l;toggleLang();}
function toggleLang(){
  L=L==="zh"?"en":"zh";
  $("#langLabel").textContent=L==="zh"?"EN":"中";
  document.getElementById("sw"+(L==="zh"?"ZH":"EN")).checked=true;
  document.querySelectorAll(".zh").forEach(function(e){e.style.display="";});
  document.querySelectorAll(".en").forEach(function(e){e.style.display="none";});
  if(L==="en"){
    document.querySelectorAll(".zh").forEach(function(e){e.style.display="none";});
    document.querySelectorAll(".en").forEach(function(e){e.style.display="";});
  }
  render();
}
var playingId=null;
function stopV(){if(window.speechSynthesis)window.speechSynthesis.cancel();playingId=null;}
function spk(text,lang,id){
  if(!window.speechSynthesis)return;
  stopV();
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="vi"?"vi-VN":lang==="tw"?"zh-TW":"zh-CN";
  u.rate=0.85;
  var voices=window.speechSynthesis.getVoices();
  if(voices.length===0)window.speechSynthesis.getVoices();
  var pref=voices.filter(function(v){return v.lang.startsWith(lang==="vi"?"vi":(lang==="tw"?"zh":"zh"));} );
  if(pref.length>0){var nat=pref.find(function(v){return v.localService||v.name.includes("Enhanced");});u.voice=nat||pref[0];}
  u.onend=function(){playingId=null;render();};
  u.onerror=function(){playingId=null;render();};
  playingId=id;
  render();
  try{window.speechSynthesis.speak(u);}catch(e){playingId=null;render();}
}

var TABS=[
  {k:"home",zh:"🏠 首頁",en:"🏠 Home"},
  {k:"days",zh:"📅 行程",en:"📅 Days"},
  {k:"rest",zh:"🍜 餐廳",en:"🍜 Eats"},
  {k:"hotel",zh:"🏨 住宿",en:"🏨 Hotel"},
  {k:"flight",zh:"✈️ 航班",en:"✈️ Flight"},
  {k:"phrase",zh:"📝 詞語",en:"📝 Phrases"},
  {k:"chk",zh:"✅ Checklist",en:"✅ Checklist"}
];
var BNAV=[
  {k:"home",zh:"首頁",lbl:{zh:"Home",en:"Home"}},
  {k:"days",zh:"行程",lbl:{zh:"Days",en:"Days"}},
  {k:"rest",zh:"餐廳",lbl:{zh:"Eats",en:"Eats"}},
  {k:"hotel",zh:"住宿",lbl:{zh:"Hotel",en:"Hotel"}},
  {k:"flight",zh:"航班",lbl:{zh:"Flight",en:"Flight"}},
  {k:"phrase",zh:"詞語",lbl:{zh:"Phrases",en:"Phrases"}},
  {k:"chk",zh:"Check",lbl:{zh:"Check",en:"Check"}}
];
var CITY_FILTERS=[
  {zh:"全部",en:"All"},
  {zh:"胡志明市",en:"HCMC"},
  {zh:"芽莊",en:"Nha Trang"},
  {zh:"大叻",en:"Dalat"},
  {zh:"台灣",en:"Taiwan"}
];
window.cityF="全部";

function render(){
  stopV();
  var el=$("content");
  var html="";

  if(cur==="home"){
    html+='<div class="og">';
    html+='<div class="oi" onclick="setTab(\'flight\')"><span class="em">✈️</span><span class="lb">'+tl("航班","Flights")+'</span><span class="sb">'+D.flights.length+tl("段"," segments")+'</span></div>';
    html+='<div class="oi" onclick="setTab(\'hotel\')"><span class="em">🏨</span><span class="lb">'+tl("住宿","Hotels")+'</span><span class="sb">'+(D.days.filter(function(d){return d.st;}).length)+tl("晚"," nights")+'</span></div>';
    html+='<div class="oi" onclick="setTab(\'days\')"><span class="em">📍</span><span class="lb">'+tl("城市","Cities")+'</span><span class="sb">4 '+tl("個城市"," cities")+'</span></div>';
    html+='<div class="oi" onclick="setTab(\'rest\')"><span class="em">🍜</span><span class="lb">'+tl("餐廳","Restaurants")+'</span><span class="sb">'+D.rest.length+tl("間"," spots")+'</span></div>';
    html+='</div>';
    html+='<div class="st">🚨 '+tl("緊急電話","Emergency")+'</div>';
    html+='<div class="ec"><div class="et">'+tl("緊急聯絡","Emergency Contacts")+'</div>';
    for(var i=0;i<D.emergency.length;i++)html+='<div class="er"><span class="el">'+D.emergency[i].l+'</span><span>'+D.emergency[i].v+'</span></div>';
    html+='</div>';
    html+='<div class="st">💡 '+tl("旅遊小技巧","Travel Tips")+'</div>';
    for(var i=0;i<D.tips.length;i++)html+='<div class="ic"><div class="ir"><div class="ii btag">💡</div><div class="icn"><div class="it">'+D.tips[i]+'</div></div></div></div>';
  }

  if(cur==="days"){
    html+='<div class="ct-pad">';
    for(var i=0;i<CITY_FILTERS.length;i++){
      var f=CITY_FILTERS[i];
      html+='<button class="flb" onclick="window.cityF=\''+f.zh+'\';render();">'+tl(f.zh,f.en)+'</button>';
    }
    html+='</div>';
    for(var di=0;di<D.days.length;di++){
      var d=D.days[di];
      var show=(window.cityF==="全部"||d.ci===window.cityF)||(window.cityF==="台灣"&&(d.ci==="台北"||d.ci==="九份"));
      html+='<div class="dc" '+(show?'>':'style="display:none">');
      html+='<div class="dh" onclick="this.classList.toggle(\'exp\');var n=this.nextSibling;while(n&&n.className==\'si\'){n.style.display=n.style.display?\'\':\'none\';n=n.nextSibling;}"><span>'+d.ti+'</span><span class="ct">'+d.ci+'</span></div>';
      for(var si=0;si<d.ss.length;si++){
        var s=d.ss[si];
        var pid="s_"+di+"_"+si;
        html+='<div class="si">';
        html+='<div class="tc">'+s.tm+'</div>';
        html+='<div class="ac">'+s.ac+'</div>';
        html+='<button class="bt" onclick="spk(\''+s.ac.replace(/\'/g,"\\'")+'\',\'zh\',\''+pid+'\')" style="background:#FF8E53">🎧</button>';
        if(s.p)html+='<a class="bt map" href="'+mm(s.p)+'" target="_blank">📍 Maps.me</a>';
        else html+='<div class="bt" style="background:#CCC">—</div>';
        html+='</div>';
      }
      if(d.st)html+='<div class="si"><div class="tc">🏨</div><div class="ac">'+tl("住宿：","Stay: ")+d.st+'</div></div>';
      html+='</div>';
    }
  }

  if(cur==="rest"){
    html+='<div class="st">🟠 '+tl("米其林推薦","Michelin Picks")+'</div>';
    for(var i=0;i<D.rest.length;i++){
      var r=D.rest[i];
      if(r.t!=="米其林"&&r.t!=="Michelin")continue;
      html+='<div class="rc"><div class="ri">🟠</div><div class="icn"><div class="it">'+r.n+' <span style="font-size:10px;color:#999">('+r.t+')</span></div><div class="is">'+r.c+tl(" | "," | ")+r.d+'</div></div><a class="bt map" href="'+mm(r.p)+'" target="_blank">📍 Maps.me</a></div>';
    }
    html+='<div class="st">🟢 '+tl("當地素食","Local Vegetarian")+'</div>';
    for(var i=0;i<D.rest.length;i++){
      var r=D.rest[i];
      if(r.t==="米其林"||r.t==="Michelin")continue;
      html+='<div class="rc"><div class="ri">🟢</div><div class="icn"><div class="it">'+r.n+' <span style="font-size:10px;color:#999">('+r.t+')</span></div><div class="is">'+r.c+tl(" | "," | ")+r.d+'</div></div><a class="bt map" href="'+mm(r.p)+'" target="_blank">📍 Maps.me</a></div>';
    }
    html+='<div class="ic" style="margin-top:10px"><div class="ir"><div class="ii btag">💡</div><div class="icn"><div class="it">'+tl("素食提示","Vegetarian Tip")+'</div><div class="is">'+tl("越南說「Toi an chay」<br>台灣說「我是素食者」<br>魚露常見，請說「Khong nuoc mam」","Say \"Toi an chay\" in Vietnam<br>Say \"我是素食者\" in Taiwan<br>Say \"Khong nuoc mam\" for no fish sauce")+'</div></div></div>';
  }

  if(cur==="hotel"){
    for(var i=0;i<D.hotels.length;i++){
      var h=D.hotels[i];
      html+='<div class="ic"><div class="ir"><div class="ii bh">🏨</div><div class="icn"><div class="it">'+h.n+'</div><div class="is">'+h.c+tl(" | "," | ")+h.ds+"<br>📞 "+h.ph+'</div></div><a class="bt map" href="'+mm(h.p)+'" target="_blank">📍 Maps.me</a></div></div>';
    }
  }

  if(cur==="flight"){
    html+='<div class="st">✈️ '+tl("航班","Flights")+'</div>';
    for(var i=0;i<D.flights.length;i++){
      var f=D.flights[i];
      html+='<div class="ic"><div class="ir"><div class="ii bf">✈️</div><div class="icn"><div class="it">'+f.a+" "+f.f+'</div><div class="is">'+f.r+tl(" | "," | ")+f.d+'</div></div><a class="bt map" href="'+mm(f.p)+'" target="_blank">📍 Maps.me</a></div></div>';
    }
  }

  if(cur==="phrase"){
    html+='<div class="sw">';
    html+='<input type="radio" name="lang" id="swVI" checked onchange="setPhraseLang(\'vi\')"><label for="swVI">越南文</label>';
    html+='<input type="radio" name="lang" id="swTW" onchange="setPhraseLang(\'tw\')"><label for="swTW">中文</label>';
    html+='</div>';
    html+='<div class="st">'+tl("🌟 日常用語","🌟 Greetings")+'</div>';
    var vdata=D.voice[window.phraseLang||"vi"];
    for(var i=0;i<vdata.greetings.length;i++){
      var b=vdata.greetings[i];
      var pid="p_vi_"+i;
      html+='<div class="rc">';
      html+='<div class="icn" style="flex:1"><div class="it">'+tl(b.zh,b.tw)+'</div><div class="is">'+(b.vi||b.pr)+'</div></div>';
      html+='<button class="bt" onclick="spk(\''+(b.vi||b.pr).replace(/\'/g,"\\'")+'\',\''+(window.phraseLang||"vi")+'\',\''+pid+'\')" style="background:#FF8E53">🎧</button>';
      html+='</div>';
    }
    html+='<div class="st">'+tl("🚨 緊急用語","🚨 Emergency")+'</div>';
    for(var i=0;i<vdata.emergency.length;i++){
      var b=vdata.emergency[i];
      var pid="p_em_"+i;
      html+='<div class="rc">';
      html+='<div class="icn" style="flex:1"><div class="it" style="color:#C0392B">'+tl(b.zh,b.tw)+'</div><div class="is">'+(b.vi||b.pr)+'</div></div>';
      html+='<button class="bt" onclick="spk(\''+(b.vi||b.pr).replace(/\'/g,"\\'")+'\',\''+(window.phraseLang||"vi")+'\',\''+pid+'\')" style="background:#C0392B">🎧</button>';
      html+='</div>';
    }
  }

  if(cur==="chk"){
    html+='<div class="st">✅ '+tl("出發前檢查清單","Pre-Trip Checklist")+'</div>';
    html+='<div class="chks">';
    for(var i=0;i<D.chkl.length;i++){
      html+='<div class="chki" onclick="chk['+i+']=!chk['+i+'];saveChk();render();">';
      html+='<div class="chkbg">'+(chk[i]?'✓':'')+'</div>';
      html+='<span style="'+(chk[i]?'text-decoration:line-through;color:#999':'')+'">'+D.chkl[i]+'</span>';
      html+='</div>';
    }
    html+='</div>';
    var done=chk.filter(function(c){return c;}).length;
    html+='<div class="ic" style="margin-top:14px;text-align:center"><div class="ir"><div class="ii bv">'+done+'/'+D.chkl.length+'</div><div class="icn"><div class="it">'+tl("已完成","Completed")+'</div></div></div></div>';
  }

  el.innerHTML=html;
  renderTabBar();
  renderBNav();
}

function setPhraseLang(l){
  window.phraseLang=l;
  render();
}

function setTab(t){cur=t;render();window.scrollTo(0,0);}

function renderTabBar(){
  var el=$("tabBar");
  if(!el)return;
  var html="";
  for(var i=0;i<TABS.length;i++){
    var t=TABS[i];
    html+='<div class="t'+(cur===t.k?" act":"")+'" data-tab="'+t.k+'" onclick="setTab(\''+t.k+'\')">'+tl(t.zh,t.en)+'</div>';
  }
  el.innerHTML=html;
}

function renderBNav(){
  var el=$("bnav");
  if(!el)return;
  var html="";
  var btabs=[
    {k:"home",zh:"🏠",en:"🏠",lbl:{zh:"首頁",en:"Home"}},
    {k:"days",zh:"📅",en:"📅",lbl:{zh:"行程",en:"Days"}},
    {k:"rest",zh:"🍜",en:"🍜",lbl:{zh:"餐廳",en:"Eats"}},
    {k:"hotel",zh:"🏨",en:"🏨",lbl:{zh:"住宿",en:"Hotel"}},
    {k:"flight",zh:"✈️",en:"✈️",lbl:{zh:"航班",en:"Flight"}},
    {k:"phrase",zh:"📝",en:"📝",lbl:{zh:"詞語",en:"Phrases"}},
    {k:"chk",zh:"✅",en:"✅",lbl:{zh:"清單",en:"List"}}
  ];
  for(var i=0;i<btabs.length;i++){
    var b=btabs[i];
    html+='<button class="bn'+(cur===b.k?" act":"")+'" onclick="setTab(\''+b.k+'\')"><span class="be">'+b.zh+'</span><span class="lbl">'+tl(b.lbl.zh,b.lbl.en)+'</span></button>';
  }
  el.innerHTML=html;
}
</script>
